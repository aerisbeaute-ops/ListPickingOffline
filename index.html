<script>
    // Setup PDF.js Worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Handle Upload PDF
    async function handlePdfUpload(event) {
      const file = event.target.files[0];
      if (!file || file.type !== 'application/pdf') {
        alert('Mohon upload file PDF Invoice yang valid!');
        return;
      }

      document.getElementById('uploadStatus').innerText = `Memproses file: ${file.name}...`;

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        
        let allItems = [];
        let fullRawText = "";

        // Loop seluruh halaman PDF
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          
          // Gabungkan teks dengan koordinat presisi
          let pageItems = textContent.items.map(item => ({
            str: item.str,
            x: item.transform[4],
            y: item.transform[5]
          }));

          allItems = allItems.concat(pageItems);
          fullRawText += textContent.items.map(x => x.str).join(" ") + " ";
        }

        parseAerisPdfInvoice(allItems, fullRawText);

      } catch (err) {
        console.error(err);
        alert('Gagal membaca PDF. Pastikan file PDF Invoice tidak dikunci.');
        document.getElementById('uploadStatus').innerText = 'Gagal memproses file.';
      }
    }

    // Parser Khusus Template Invoice AERIS
    function parseAerisPdfInvoice(textItems, rawText) {
      // 1. Ekstrak Nomor Invoice Lengkap (Mendukung format dengan tanda kurung / spasi)
      let invoiceNo = "RES-INVOICE";
      let invoiceMatch = rawText.match(/RES-[\w\d\/-]+(?:\([^)]+\)|[^\s\n]+)*/i);
      if (invoiceMatch) {
        invoiceNo = invoiceMatch[0].trim();
      }

      // 2. Kelompokkan Teks Berdasarkan Baris Y (Toleransi 3px untuk multiline)
      let rowGroups = {};
      textItems.forEach(item => {
        let str = item.str.trim();
        if (!str) return;

        // Cari Y group terdekat
        let yKey = Object.keys(rowGroups).find(y => Math.abs(parseFloat(y) - item.y) < 3.5);
        if (!yKey) {
          yKey = item.y.toString();
          rowGroups[yKey] = [];
        }
        rowGroups[yKey].push(item);
      });

      // Urutkan Baris dari Atas ke Bawah
      let sortedYKeys = Object.keys(rowGroups).sort((a, b) => parseFloat(b) - parseFloat(a));

      let rawRows = [];
      sortedYKeys.forEach(y => {
        // Urutkan kata dari Kiri ke Kanan berdasarkan X
        let itemsInRow = rowGroups[y].sort((a, b) => a.x - b.x);
        let lineText = itemsInRow.map(i => i.str).join(" ").trim();
        if (lineText) rawRows.push(lineText);
      });

      // 3. Ekstrak & Grouping Produk (Qty Beli vs Qty Free)
      let groupedProducts = {};

      for (let i = 0; i < rawRows.length; i++) {
        let line = rawRows[i];

        // Abaikan Catatan Ketentuan Pembayaran / Syarat Retur di bagian bawah PDF
        if (line.includes("Ketentuan Pembayaran") || line.includes("Terbilang:") || line.includes("Syarat dan Ketentuan")) {
          break;
        }

        // Cek apakah baris ini memuat data item (memiliki penanda Diskon % atau format Rp)
        if (line.includes("%")) {
          let isFree = line.includes("100%");

          // Cari nilai Qty (Angka pertama setelah nomor urut)
          let matchQty = line.match(/^\d+\s+([\s\S]+?)\s+(\d+)\s+Rp/);
          
          let desc = "";
          let qty = 0;

          if (matchQty) {
            desc = matchQty[1].trim();
            qty = parseInt(matchQty[2]) || 0;
          } else {
            // Pembersihan alternatif regex jika struktur sedikit bergeser
            let parts = line.split(/\s+/);
            if (!isNaN(parts[0])) parts.shift(); // Hapus nomor urut depan
            
            // Ambil Qty sebelum kata 'Rp'
            let rpIndex = parts.findIndex(p => p.includes("Rp"));
            if (rpIndex > 1) {
              qty = parseInt(parts[rpIndex - 1]) || 1;
              desc = parts.slice(0, rpIndex - 1).join(" ");
            }
          }

          // Bersihkan sisa karakter aneh/harga yang mungkin tersisa di nama deskripsi
          desc = desc.replace(/-?\s*Rp.*/i, '').replace(/\b\d+\s*$/, '').trim();

          // Jika nama deskripsi terpotong di baris sebelumnya (multi-line), gabungkan
          if (i > 0 && !rawRows[i-1].includes("%") && !rawRows[i-1].includes("INVOICE") && !rawRows[i-1].includes("No")) {
            let prevText = rawRows[i-1].trim();
            if (!prevText.match(/^\d+$/) && !prevText.includes("AERIS") && !prevText.includes("Toko")) {
               desc = prevText + " " + desc;
            }
          }

          if (desc && qty > 0) {
            if (!groupedProducts[desc]) {
              groupedProducts[desc] = { desc: desc, qtyBeli: 0, qtyFree: 0 };
            }

            if (isFree) {
              groupedProducts[desc].qtyFree += qty;
            } else {
              groupedProducts[desc].qtyBeli += qty;
            }
          }
        }
      }

      // 4. Konversi ke Format Final Array
      let finalItems = [];
      let index = 1;

      for (let key in groupedProducts) {
        finalItems.push({
          no: index++,
          desc: key,
          qtyBeli: groupedProducts[key].qtyBeli,
          qtyFree: groupedProducts[key].qtyFree
        });
      }

      // Render Hasil ke UI
      updateDashboardUI(invoiceNo, finalItems);
    }

    // Render Data ke Tampilan Dashboard & Cetak
    function updateDashboardUI(invoiceNo, items) {
      document.getElementById('invoiceNoHeader').innerText = invoiceNo;
      document.getElementById('printInvoiceTitle').innerText = invoiceNo;
      document.getElementById('uploadStatus').innerText = `Berhasil memuat invoice: ${invoiceNo}`;
      document.getElementById('sysStatus').innerText = `READY TO PRINT`;

      const prevTbody = document.getElementById('previewTbody');
      const printTbody = document.getElementById('printTbody');

      prevTbody.innerHTML = '';
      printTbody.innerHTML = '';

      let totalUnitSum = 0;

      items.forEach((item) => {
        let total = item.qtyBeli + item.qtyFree;
        totalUnitSum += total;

        // Row Dashboard
        prevTbody.innerHTML += `
          <tr>
            <td>${item.no}</td>
            <td>${item.desc}</td>
            <td style="text-align: center;">${item.qtyBeli || '-'}</td>
            <td style="text-align: center;">${item.qtyFree || '-'}</td>
            <td style="text-align: center; color: var(--aeris-primary); font-weight:700;">${total}</td>
          </tr>
        `;

        // Row Printout (Tabel Bersisian Sempurna)
        printTbody.innerHTML += `
          <tr>
            <td class="text-center">${item.no}</td>
            <td>${item.desc}</td>
            <td class="text-center">${item.qtyBeli > 0 ? item.qtyBeli : ''}</td>
            <td class="text-center">${item.qtyFree > 0 ? item.qtyFree : ''}</td>
            <td class="text-center">${total}</td>
          </tr>
        `;
      });

      document.getElementById('metricTotalUnit').innerText = totalUnitSum;
      document.getElementById('metricSkuTypes').innerText = items.length;
    }
  </script>
